apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-ai
  namespace: aegis
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aegis-ai
  template:
    metadata:
      labels:
        app: aegis-ai
    spec:
      containers:
        - name: aegis-ai
          image: fierynxx/aegis-ai:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-ai-svc
  namespace: aegis
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: aegis-ai
